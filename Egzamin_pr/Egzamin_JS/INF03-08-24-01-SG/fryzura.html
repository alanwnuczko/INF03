<!DOCTYPE html>

    <title>Fryzjerstwo</title>

<body>
    <main>
        <section id="left">

                <h1><a href="index.html">SALON FRYZJERSKI</a></h1>
            </section>

                <label>

                <label>
                    <input type="radio" name="typ" id="srednie">Średnie<br>
                </label>
                <label>
                    <input type="radio" name="typ" id="poldlugie">Półdługie<br>

                <label>
                    <input type="radio" name="typ" id="dlugie">Długie<br>

                <table>
                    <tr>
                        <th>Długość włosów</th>

                    </tr>

                        <td>Krótkie</td>
                        <td>25</td>
                    </tr>
                    <tr>
                        <td>Średnie</td>
                        <td>30</td>
                    </tr>
                    <tr>
                        <td>Półdługie</td>

                    </tr>
                    <tr>
                        <td>Długie</td>
                        <td>50</td>
                    </tr>

            <section id="right2">
                <img src="obraz1.jpg" alt="Fryzjerka">

        </section>

    <footer>
        <p>Autor: <a href="https://www.github.com/alanwnuczko">Alan Wnuczko</a></p>
    </footer>
